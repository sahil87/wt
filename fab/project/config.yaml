agent:
    spawn_command: claude --dangerously-skip-permissions --effort xhigh -n "$(basename "$(pwd)")"
checklist:
    extra_categories: []
fab_version: 2.6.6
project:
    description: Git worktree management CLI — create, list, open, and delete worktrees with shell integration.
    name: worktree-cli
source_paths:
    - src/cmd
    - src/internal
true_impact_exclude:
    - fab/
    - docs/
