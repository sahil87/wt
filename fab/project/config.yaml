checklist:
    extra_categories: []
fab_version: 2.13.6
project:
    description: Git worktree management CLI — create, list, open, and delete worktrees with shell integration.
    name: worktree-cli
providers:
    claude:
        session_command: claude --dangerously-skip-permissions --effort xhigh -n "$(basename "$(pwd)")"
source_paths:
    - src/cmd
    - src/internal
test_paths:
    - '**/*_test.go'
true_impact_exclude:
    - fab/
    - docs/
